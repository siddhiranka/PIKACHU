<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pure CSS Pikachu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <div class="sun"></div>
    <div class="cloud cloud-a"></div>
    <div class="cloud cloud-b"></div>

    <div class="pikachu">
      <!-- Ears -->
      <div class="ear left">
        <div class="tip"></div>
        <div class="ear-shade"></div>
      </div>
      <div class="ear right">
        <div class="tip"></div>
        <div class="ear-shade"></div>
      </div>

      <!-- Head -->
      <div class="head">
        <div class="brow left"></div>
        <div class="brow right"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="cheek left"></div>
        <div class="cheek right"></div>
        <div class="nose"></div>
        <div class="mouth"></div>
        <div class="jaw-shade"></div>
      </div>

      <!-- Body -->
      <div class="body">
        <div class="stripe s1"></div>
        <div class="stripe s2"></div>
        <div class="stripe s3"></div>
        <div class="stripe s4"></div>
        <div class="belly"></div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="foot left"></div>
        <div class="foot right"></div>
      </div>

      <!-- Tail -->
      <div class="tail">
        <div class="tail-seg base">
          <div class="tail-shade"></div>
        </div>
        <div class="tail-seg mid"></div>
        <div class="tail-seg tip"></div>
      </div>

      <div class="spark a"></div>
      <div class="spark b"></div>
    </div>

    <div class="ground"></div>
    <div class="title-tag">Hand-coded with HTML &amp; CSS only</div>
  </div>
</body>
</html>
